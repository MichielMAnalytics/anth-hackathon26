<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0a0a0b"/>
  <!-- Thread: a single continuous arc connecting three distant nodes -->
  <path
    d="M 8 22 C 8 6 24 6 24 22"
    stroke="#ffffff"
    stroke-width="1.75"
    stroke-linecap="round"
  />
  <!-- Nodes the thread binds together -->
  <circle cx="8" cy="22" r="2.2" fill="#ffffff"/>
  <circle cx="16" cy="10" r="2.2" fill="#ffffff"/>
  <circle cx="24" cy="22" r="2.2" fill="#ffffff"/>
</svg>
